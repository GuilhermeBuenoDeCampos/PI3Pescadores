<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tres Pescadores</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Load runtime config (config.json) from server root before booting the app.
      (function(){
        function safeParseJson(text){ try{ return JSON.parse(text); }catch(e){ return {}; } }
        fetch('/config.json').then(function(res){
          if(res.ok){ return res.text(); }
          return '{}';
        }).then(function(txt){
          window.APP_CONFIG = safeParseJson(txt || '{}');
        }).catch(function(){ window.APP_CONFIG = {}; })
        .finally(function(){
          // Dynamically import the main module after config is set
          var s = document.createElement('script');
          s.type = 'module';
          s.src = '/src/main.jsx';
          document.body.appendChild(s);
        });
      })();
    </script>
  </body>
</html>
